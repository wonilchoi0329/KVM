name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Unit tests
        run: swift test --arch arm64

      - name: AddressSanitizer tests
        run: swift test --arch arm64 --sanitize address

      - name: Analyze C transport
        run: |
          xcrun clang --analyze \
            -isysroot "$(xcrun --sdk macosx --show-sdk-path)" \
            -I Sources/HostHopDDC/include \
            -o "$RUNNER_TEMP/HostHopDDC-analysis.plist" \
            Sources/HostHopDDC/HostHopDDC.c

      - name: Build and security verification
        run: ./Scripts/verify.sh
